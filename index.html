<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    video { width: 100%; height: 100%; object-fit: contain; }
  </style>
</head>
<body>
  <video id="player"></video>
  <script>
    const params = new URLSearchParams(window.location.search)
    const videoParam = params.get('video') || ''

    // Resolve video URL
    let videoUrl = ''
    try {
      new URL(videoParam)
      videoUrl = videoParam // absolute URL
    } catch {
      videoUrl = `http://localhost/storage/${videoParam}`
    }

    const player = document.getElementById('player')
    player.src = videoUrl

    // Poll /poll every second
    setInterval(async () => {
      try {
        const res = await fetch('/poll')
        const command = (await res.text()).trim()

        if (command === 'STOP') {
          if (!player.paused) player.pause()
        } else if (command.startsWith('SEEK:')) {
          const targetMs = parseInt(command.slice(5), 10)
          const targetSec = targetMs / 1000
          const currentSec = player.currentTime
          const delta = Math.abs(currentSec - targetSec)

          if (delta > 2) {
            player.currentTime = targetSec
          }
          if (player.paused) {
            player.play().catch(() => {})
          }
        }
        // NOP: do nothing
      } catch (e) {
        // network error, ignore
      }
    }, 1000)
  </script>
</body>
</html>
