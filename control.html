<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
      gap: 2rem;
    }
    #timer {
      font-size: 4rem;
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    #status {
      font-size: 1.2rem;
      opacity: 0.7;
    }
    .buttons {
      display: flex;
      gap: 1.5rem;
    }
    button {
      font-size: 1.5rem;
      padding: 1rem 3rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #restartBtn {
      background: #0f3460;
      color: #eee;
    }
    #restartBtn:hover { background: #16213e; }
    #stopBtn {
      background: #e94560;
      color: #fff;
    }
    #stopBtn:hover { background: #c0392b; }
    #lengthInput {
      font-size: 4rem;
      padding: 0;
      border: none;
      border-bottom: 2px solid #444;
      background: transparent;
      color: #eee;
      text-align: center;
      width: 5ch;
      font-variant-numeric: tabular-nums;
      font-family: inherit;
    }
    #lengthInput:focus {
      outline: none;
      border-bottom-color: #e94560;
    }
  </style>
</head>
<body>
  <div id="timer"><span id="elapsed"></span><span id="separator" style="display:none"> / </span><input id="lengthInput" type="text" value="" style="display:none" /></div>
  <div id="status"></div>
  <div class="buttons">
    <button id="restartBtn">Restart</button>
    <button id="stopBtn">Stop</button>
    <button id="reloadPlayerBtn">Reload Player</button>
    <button id="debugStartBtn">Debug Start</button>
    <button id="reloadBtn" onclick="location.reload()">Reload</button>
  </div>

  <script>
    const timerEl = document.getElementById('elapsed')
    const separatorEl = document.getElementById('separator')
    const statusEl = document.getElementById('status')
    const lengthInput = document.getElementById('lengthInput')

    function parseMmSs(str) {
      const parts = str.split(':')
      if (parts.length !== 2) return null
      const min = parseInt(parts[0], 10)
      const sec = parseInt(parts[1], 10)
      if (isNaN(min) || isNaN(sec)) return null
      return (min * 60 + sec) * 1000
    }

    function formatMmSs(ms) {
      const totalSec = Math.floor(ms / 1000)
      const min = Math.floor(totalSec / 60)
      const sec = totalSec % 60
      return `${min}:${String(sec).padStart(2, '0')}`
    }

    async function flushResponse(fetchPromise) {
      const res = await fetchPromise
      await res.text()
    }

    lengthInput.addEventListener('change', async () => {
      const ms = parseMmSs(lengthInput.value)
      if (ms && ms > 0) {
        await flushResponse(fetch('/control/length', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lengthMs: ms })
        }))
      }
    })

    document.getElementById('restartBtn').addEventListener('click', async () => {
      await flushResponse(fetch('/control/restart', { method: 'POST' }))
    })

    document.getElementById('stopBtn').addEventListener('click', async () => {
      await flushResponse(fetch('/control/stop', { method: 'POST' }))
    })

    document.getElementById('reloadPlayerBtn').addEventListener('click', async () => {
      await flushResponse(fetch('/control/reload-player', { method: 'POST' }))
    })

    document.getElementById('debugStartBtn').addEventListener('click', async () => {
      await flushResponse(fetch('/control/debug-start', { method: 'POST' }))
    })

    function formatTime(ms) {
      const totalSec = Math.floor(ms / 1000)
      const min = Math.floor(totalSec / 60)
      const sec = totalSec % 60
      return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`
    }

    // Poll status every second
    setInterval(async () => {
      try {
        const res = await fetch('/status')
        const data = await res.json()
        statusEl.textContent = data.mode
        separatorEl.style.display = ''
        lengthInput.style.display = ''
        if (!lengthInput.matches(':focus')) {
          lengthInput.value = formatMmSs(data.lengthMs)
        }
        if (data.mode === 'RUNNING') {
          timerEl.textContent = formatTime(data.elapsedMs)
        } else {
          timerEl.textContent = '00:00'
        }
      } catch (e) {
        // ignore
      }
    }, 1000)
  </script>
</body>
</html>
